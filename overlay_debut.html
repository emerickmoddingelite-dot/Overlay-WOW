<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>WoW Overlay — Début de Live</title>
<link rel="stylesheet" href="shared.css">
<style>

/* ── LAYOUT ── */
.scene {
  position: absolute; inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* ── FACTION RUNES ── */
.rune {
  position: absolute;
  font-size: 200px;
  font-weight: 900;
  user-select: none;
  pointer-events: none;
  opacity: 0.055;
  filter: blur(1px);
  animation: fadeIn 3s var(--ease-out-expo) both;
}
.rune-l { left: 120px; top: 50%; transform: translateY(-50%); color: var(--horde); }
.rune-r { right: 120px; top: 50%; transform: translateY(-50%); color: var(--alliance); }

/* ── VERTICAL LINES ── */
.vline {
  position: absolute;
  top: 80px; bottom: 80px;
  width: 1px;
  background: linear-gradient(180deg,
    transparent,
    var(--border) 20%,
    var(--border-mid) 50%,
    var(--border) 80%,
    transparent
  );
  animation: fadeIn 2s 0.5s both;
}
.vline-l { left: 200px; }
.vline-r { right: 200px; }

/* ── HORIZONTAL SCANLINE ── */
.scanline {
  position: absolute;
  left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg,
    transparent 0%,
    rgba(200,160,0,0.08) 20%,
    rgba(200,160,0,0.25) 50%,
    rgba(200,160,0,0.08) 80%,
    transparent 100%
  );
  animation: scanline 8s linear infinite;
  pointer-events: none;
}

/* ── CENTER BLOCK ── */
.center {
  text-align: center;
  position: relative;
  z-index: 10;
  animation: fadeInScale 1.4s var(--ease-out-expo) 0.2s both;
}

.eyebrow {
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 10px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 20px;
  animation: fadeInUp 1s 0.6s both;
}

.main-title {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 104px;
  line-height: 0.88;
  letter-spacing: 1px;
  background: linear-gradient(180deg,
    #ffffff 0%,
    #fff5c0 15%,
    var(--gold) 38%,
    var(--gold-dark) 65%,
    var(--gold-dim) 88%,
    #3a2800 100%
  );
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter:
    drop-shadow(0 0 60px rgba(200,150,0,0.45))
    drop-shadow(0 6px 12px rgba(0,0,0,0.9));
  margin-bottom: 30px;
  animation: fadeInUp 1s 0.3s both;
}

.deco-row {
  display: flex; align-items: center; justify-content: center;
  gap: 20px; margin-bottom: 24px;
  animation: fadeIn 1s 0.8s both;
}
.deco-row-arm {
  height: 1px;
  width: 180px;
  background: linear-gradient(90deg, transparent, var(--gold-dim));
}
.deco-row-arm.r { background: linear-gradient(90deg, var(--gold-dim), transparent); }
.deco-row-gem {
  width: 9px; height: 9px;
  background: var(--gold);
  transform: rotate(45deg);
  box-shadow: 0 0 14px var(--gold-glow), 0 0 4px rgba(255,215,0,0.9);
}

.subtitle {
  font-family: var(--font-ui);
  font-size: 18px;
  letter-spacing: 7px;
  text-transform: uppercase;
  color: var(--text-gold);
  opacity: 0.8;
  margin-bottom: 44px;
  animation: fadeInUp 1s 0.9s both;
}

/* ── LIVE BADGE ── */
.live-badge {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  padding: 13px 40px;
  border: 1px solid var(--border-mid);
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(8px);
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: var(--gold);
  animation: fadeInUp 1s 1.1s both, pulseGlow 2.5s 2s ease-in-out infinite;
}
.live-dot {
  width: 9px; height: 9px;
  background: #ff3030;
  border-radius: 50%;
  box-shadow: 0 0 10px #ff0000, 0 0 20px rgba(255,0,0,0.4);
  animation: blink 1.1s ease-in-out infinite;
}

/* ── INFO BAR ── */
.info-bar {
  position: absolute;
  bottom: 36px; left: 0; right: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 0;
  animation: fadeInUp 1.2s 1.4s both;
}
.info-item {
  display: flex; flex-direction: column;
  align-items: center; gap: 5px;
  padding: 0 52px;
}
.info-sep {
  width: 1px;
  height: 36px;
  background: linear-gradient(180deg, transparent, var(--border-mid), transparent);
}
.info-label {
  font-family: var(--font-ui);
  font-size: 9px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--text-dim);
}
.info-value {
  font-family: var(--font-body);
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 2px;
  color: var(--text-gold);
}

/* ── BOTTOM GLOW ── */
.bottom-glow {
  position: absolute;
  bottom: 0; left: 25%; right: 25%;
  height: 120px;
  background: radial-gradient(ellipse at 50% 100%, rgba(200,146,0,0.18) 0%, transparent 70%);
  pointer-events: none;
}

</style>
</head>
<body class="overlay">

<!-- Backgrounds -->
<div class="bg bg-base"></div>
<div class="scanline"></div>
<div class="bottom-glow"></div>

<!-- Borders & corners -->
<div class="border-top"></div>
<div class="border-bottom"></div>
<div class="corners">
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>
</div>

<!-- Watermarks -->
<div class="watermark-l" data-cfg="overlays.debut.tagline"></div>
<div class="watermark-r" data-cfg="overlays.debut.tagline"></div>

<!-- Faction runes -->
<div class="rune rune-l">⚔</div>
<div class="rune rune-r">🛡</div>

<!-- Vertical guide lines -->
<div class="vline vline-l"></div>
<div class="vline vline-r"></div>

<!-- Center content -->
<div class="scene">
  <div class="center">
    <div class="eyebrow">World of Warcraft</div>

    <div class="main-title" data-cfg="overlays.debut.titre">LE LIVE COMMENCE</div>

    <div class="deco-row">
      <div class="deco-row-arm"></div>
      <div class="deco-row-gem"></div>
      <div class="deco-row-arm r"></div>
    </div>

    <div class="subtitle" data-cfg="overlays.debut.sousTitre">Prépare-toi au combat</div>

    <div class="live-badge">
      <div class="live-dot"></div>
      <span data-cfg="overlays.debut.badge">EN DIRECT</span>
      <div class="live-dot"></div>
    </div>
  </div>
</div>

<!-- Info bar -->
<div class="info-bar">
  <div class="info-item">
    <span class="info-label">Serveur</span>
    <span class="info-value" data-cfg="streamer.serveur"></span>
  </div>
  <div class="info-sep"></div>
  <div class="info-item">
    <span class="info-label">Personnage</span>
    <span class="info-value" data-cfg="streamer.guilde" data-cfg-show="streamer.guilde"></span>
  </div>
  <div class="info-sep"></div>
  <div class="info-item">
    <span class="info-label">Contenu</span>
    <span class="info-value" data-cfg="streamer.contenu"></span>
  </div>
  <div class="info-sep"></div>
  <div class="info-item">
    <span class="info-label">Classe</span>
    <span class="info-value" data-cfg="streamer.classe"></span>
  </div>
</div>

<script src="config.js"></script>
<script src="shared.js"></script>
</body>
</html>
