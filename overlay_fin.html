<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>WoW Overlay — Fin de Live</title>
<link rel="stylesheet" href="shared.css">
<style>

/* ── VIGNETTE ── */
.vignette {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 50%,
    transparent 30%,
    rgba(0,0,0,0.6) 80%,
    rgba(0,0,0,0.9) 100%
  );
  pointer-events: none;
}

/* ── TOP BANNER ── */
.top-banner {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 90px;
  background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%);
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 1s 0.2s both;
}
.top-banner-text {
  font-family: var(--font-ui);
  font-size: 10px;
  letter-spacing: 10px;
  text-transform: uppercase;
  color: var(--text-dim);
}

/* ── CENTER SCENE ── */
.scene {
  position: absolute; inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* ── GOODBYE SYMBOL ── */
.outro-symbol {
  font-size: 60px;
  margin-bottom: 20px;
  filter: drop-shadow(0 0 30px rgba(200,150,0,0.5));
  animation: fadeInScale 1.5s var(--ease-out-expo) 0.2s both;
}

/* ── TITLE ── */
.fin-eyebrow {
  font-family: var(--font-ui);
  font-size: 11px;
  letter-spacing: 10px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 16px;
  animation: fadeIn 1s 0.4s both;
}

.fin-title {
  font-family: var(--font-display);
  font-size: 96px;
  font-weight: 900;
  line-height: 0.88;
  letter-spacing: 3px;
  background: linear-gradient(180deg,
    #ffffff 0%,
    #fff5c0 12%,
    var(--gold) 36%,
    var(--gold-dark) 64%,
    var(--gold-dim) 86%,
    #2a1800 100%
  );
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 50px rgba(200,150,0,0.4)) drop-shadow(0 6px 12px rgba(0,0,0,0.9));
  margin-bottom: 24px;
  animation: fadeInScale 1.2s var(--ease-out-expo) 0.2s both;
}

.deco-fin {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 20px;
  animation: fadeIn 1s 0.7s both;
}
.deco-fin-arm { height: 1px; width: 200px; }
.deco-fin-arm.l { background: linear-gradient(90deg, transparent, var(--border-mid)); }
.deco-fin-arm.r { background: linear-gradient(90deg, var(--border-mid), transparent); }
.deco-fin-gem { width: 9px; height: 9px; background: var(--gold); transform: rotate(45deg); box-shadow: 0 0 12px var(--gold-glow); }

.fin-sub {
  font-family: var(--font-ui);
  font-size: 16px;
  letter-spacing: 7px;
  text-transform: uppercase;
  color: var(--text-gold);
  opacity: 0.75;
  margin-bottom: 8px;
  animation: fadeInUp 1s 0.8s both;
}
.fin-msg {
  font-family: var(--font-body);
  font-size: 19px;
  font-weight: 300;
  letter-spacing: 2px;
  color: var(--text-dim);
  margin-bottom: 48px;
  animation: fadeInUp 1s 0.9s both;
}

/* ── CTA ── */
.cta-box {
  background: rgba(0,0,0,0.55);
  border: 1px solid var(--border-mid);
  padding: 14px 48px;
  font-family: var(--font-ui);
  font-size: 13px;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 56px;
  animation: fadeInUp 1s 1s both, pulseGlow 3s 1.5s ease-in-out infinite;
}

/* ── SOCIAL CARDS ── */
.social-cards::-webkit-scrollbar {
  display: none;
}

.social-cards {
  display: flex;
  gap: 16px;
  overflow-x: auto;
  white-space: nowrap;
  padding-bottom: 10px;
}

.social-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;

  padding: 20px;
  border-radius: 16px;

  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);

  border: 1px solid rgba(255,255,255,0.08);

  transition: all 0.3s ease;
  cursor: pointer;
}

.social-card:hover {
  transform: translateY(-6px) scale(1.03);
}

/* ICON */
.social-card-icon {
  width: 42px;
  height: 42px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.social-card-icon svg {
  width: 100%;
  height: 100%;
}

/* TEXT */
.social-card-value {
  font-size: 18px;
  font-weight: 600;
}

.social-card-label {
  font-size: 13px;
  opacity: 0.6;
}

/* COLORS + GLOW */

/* Twitch */
.twitch { color: #9146FF; }
.twitch:hover { box-shadow: 0 0 25px rgba(145,70,255,0.5); }

/* Discord */
.discord { color: #5865F2; }
.discord:hover { box-shadow: 0 0 25px rgba(88,101,242,0.5); }

/* X */
.twitter { color: #ffffff; }
.twitter:hover { box-shadow: 0 0 20px rgba(255,255,255,0.2); }

/* YouTube */
.youtube { color: #FF0000; }
.youtube:hover { box-shadow: 0 0 25px rgba(255,0,0,0.5); }

/* TikTok */
.tiktok {
  color: #ffffff;
}
.tiktok .social-card-icon svg {
  filter: drop-shadow(2px 0 #25F4EE) drop-shadow(-2px 0 #FE2C55);
}
.tiktok:hover {
  box-shadow: 0 0 20px rgba(255,255,255,0.2);
}
/* ── SOCIAL CARDS ── */
/* ── SIDE TEXTS ── */
.side-quote {
  position: absolute;
  font-family: var(--font-ui);
  font-size: 9px;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: var(--text-dim);
  opacity: 0.4;
  white-space: nowrap;
  animation: fadeIn 2s 1.5s both;
}
.side-quote-l {
  left: 36px; top: 50%;
  transform: translateY(-50%) rotate(-90deg);
}
.side-quote-r {
  right: 36px; top: 50%;
  transform: translateY(-50%) rotate(90deg);
}

/* ── HIDE TIKTOK IF EMPTY ── */
.social-card[data-cfg-show="socials.tiktok"] { }

</style>
</head>
<body class="overlay">

<div class="bg bg-base"></div>
<div class="vignette"></div>

<div class="border-top"></div>
<div class="border-bottom"></div>
<div class="corners">
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>
</div>

<div class="side-quote side-quote-l" data-cfg="overlays.fin.message"></div>
<div class="side-quote side-quote-r" data-cfg="overlays.fin.message"></div>

<div class="top-banner">
  <div class="top-banner-text">World of Warcraft — Stream Terminé</div>
</div>

<div class="scene">
  <div class="outro-symbol">🏆</div>
  <div class="fin-eyebrow"></div>

  <div class="fin-title" data-cfg="overlays.fin.titre"></div>

  <div class="deco-fin">
    <div class="deco-fin-arm l"></div>
    <div class="deco-fin-gem"></div>
    <div class="deco-fin-arm r"></div>
  </div>

  <div class="fin-sub" data-cfg="overlays.fin.sousTitre"></div>
  <div class="fin-msg" data-cfg="overlays.fin.message"></div>

  <div class="cta-box" data-cfg="overlays.fin.cta"></div>

<div class="social-cards">

  <div class="social-card twitch">
    <span class="social-card-icon">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M4 2L2 6v14h5v2h3l2-2h3l5-5V2H4zm14 11l-3 3h-3l-2 2v-2H6V4h12v9z"/>
      </svg>
    </span>
    <span class="social-card-value" data-cfg="socials.twitch"></span>
    <span class="social-card-label">Twitch</span>
  </div>

  <div class="social-card discord">
    <span class="social-card-icon">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M20 4a17 17 0 0 0-4-1l-.2.4a16 16 0 0 1 3.7 1.1c-3.5-1.6-7.4-1.6-10.9 0A16 16 0 0 1 12 3.4l-.2-.4a17 17 0 0 0-4 1A18 18 0 0 0 2 19a17 17 0 0 0 5 2.5l.4-.6c-1.6-.5-3-1.3-4.2-2.3.3.2.6.4.9.6 3.4 2 7.8 2 11.2 0 .3-.2.6-.4.9-.6-1.2 1-2.6 1.8-4.2 2.3l.4.6A17 17 0 0 0 22 19a18 18 0 0 0-2-15z"/>
      </svg>
    </span>
    <span class="social-card-value" data-cfg="socials.discord"></span>
    <span class="social-card-label">Discord</span>
  </div>

  <div class="social-card twitter">
    <span class="social-card-icon">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M3 3h4l5 7 6-7h3l-8 9 9 12h-4l-6-8-7 8H2l9-10L3 3z"/>
      </svg>
    </span>
    <span class="social-card-value" data-cfg="socials.twitter"></span>
    <span class="social-card-label">Twitter / X</span>
  </div>

  <div class="social-card youtube">
    <span class="social-card-icon">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M23 7s-.2-1.7-.8-2.5c-.8-1-1.7-1-2.1-1.1C17.2 3 12 3 12 3s-5.2 0-8.1.4c-.4 0-1.3 0-2.1 1.1C1.2 5.3 1 7 1 7S1 9 1 11v2c0 2 0 4 0 4s.2 1.7.8 2.5c.8 1 1.9 1 2.4 1.1C6.8 21 12 21 12 21s5.2 0 8.1-.4c.4 0 1.3 0 2.1-1.1.6-.8.8-2.5.8-2.5s0-2 0-4v-2c0-2 0-4 0-4zM10 15V9l6 3-6 3z"/>
      </svg>
    </span>
    <span class="social-card-value" data-cfg="socials.youtube"></span>
    <span class="social-card-label">YouTube</span>
  </div>

  <div class="social-card tiktok">
    <span class="social-card-icon">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M16 3c.5 2.5 2 4 4 4v3c-1.5 0-3-.5-4-1.5V14a5 5 0 1 1-5-5c.3 0 .7 0 1 .1v3a2 2 0 1 0 2 2V3h2z"/>
      </svg>
    </span>
    <span class="social-card-value" data-cfg="socials.tiktok"></span>
    <span class="social-card-label">TikTok</span>
  </div>

</div>
</div>

<script src="config.js"></script>
<script src="shared.js"></script>
</body>
</html>
